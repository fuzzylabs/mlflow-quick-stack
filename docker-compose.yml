# ============================================================================
# MLflow Quick Stack — Docker Compose
# ============================================================================
# Services:
#   traefik        – HTTPS reverse proxy (ports 80 → 443 redirect, 443 TLS)
#   postgres       – Backend metadata store + MLflow auth DB
#   minio          – S3-compatible artifact store
#   create-bucket  – One-shot init container to create the S3 bucket
#   mlflow         – Tracking server with GenAI & basic-auth enabled
#   localai        – OpenAI-compatible local model server
#   open-webui     – Chat UI frontend for LocalAI + Ollama
# ============================================================================

name: mlflow-quick-stack

services:
  # ── Traefik reverse proxy ──────────────────────────────────────────────────
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./volumes/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./volumes/traefik/dynamic/:/etc/traefik/dynamic/:ro
      - ./volumes/traefik/certs/:/etc/traefik/certs/:ro
      - ./volumes/traefik/acme/:/letsencrypt/
    networks:
      - mlflow-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18
    container_name: mlflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql
    networks:
      - mlflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: quay.io/minio/minio:latest
    container_name: mlflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${LOCALHOST_MINIO_API_PORT:-9000}:9000"
      - "${LOCALHOST_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./volumes/minio:/data
    networks:
      - mlflow-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Bucket initialisation (run once) ───────────────────────────────────────
  create-bucket:
    image: quay.io/minio/mc:latest
    container_name: mlflow-create-bucket
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_MLFLOW: ${S3_BUCKET_MLFLOW}
      S3_BUCKET_QUANTIZED_MODELS: ${S3_BUCKET_QUANTIZED_MODELS}
      S3_BUCKET_FULL_PRECISION_MODELS: ${S3_BUCKET_FULL_PRECISION_MODELS}
      S3_BUCKET_DATASETS: ${S3_BUCKET_DATASETS}
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing myminio/$${S3_BUCKET_MLFLOW} &&
        mc mb --ignore-existing myminio/$${S3_BUCKET_QUANTIZED_MODELS} &&
        mc mb --ignore-existing myminio/$${S3_BUCKET_FULL_PRECISION_MODELS} &&
        mc mb --ignore-existing myminio/$${S3_BUCKET_DATASETS} &&
        echo 'Buckets ready: '$${S3_BUCKET_MLFLOW}', '$${S3_BUCKET_QUANTIZED_MODELS}', '$${S3_BUCKET_FULL_PRECISION_MODELS}', '$${S3_BUCKET_DATASETS}
      "
    networks:
      - mlflow-network

  # ── MLflow Tracking Server (GenAI) ─────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
      args:
        MLFLOW_VERSION: ${MLFLOW_VERSION:-v3.10.0}
    image: mlflow-quick-stack:latest
    container_name: mlflow-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    environment:
      # Backend store
      MLFLOW_BACKEND_STORE_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      # Artifact store (S3 / MinIO)
      MLFLOW_ARTIFACTS_DESTINATION: "s3://${S3_BUCKET_MLFLOW}"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      MLFLOW_S3_IGNORE_TLS: "true"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      # Ollama (local LLM on host)
      OLLAMA_HOST: ${OLLAMA_BASE_URL}
      # MLflow built-in auth (required for AI Gateway)
      MLFLOW_AUTH_CONFIG_PATH: /mlflow/basic_auth.ini
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_FLASK_SERVER_SECRET_KEY}
      MLFLOW_CRYPTO_KEK_PASSPHRASE: ${MLFLOW_CRYPTO_KEK_PASSPHRASE}
    volumes:
      - ./volumes/mlflow/basic_auth.ini:/mlflow/basic_auth.ini:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${LOCALHOST_MLFLOW_PORT:-5000}:${MLFLOW_PORT}"
    command: >
      mlflow server
        --backend-store-uri "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
        --artifacts-destination "s3://${S3_BUCKET_MLFLOW}"
        --serve-artifacts
        --host 0.0.0.0
        --port ${MLFLOW_PORT}
        --allowed-hosts "${MLFLOW_DOMAIN},localhost:*,127.0.0.1:*"
        --cors-allowed-origins "https://${MLFLOW_DOMAIN},http://localhost:*"
        --app-name basic-auth
        -w 1
    networks:
      - mlflow-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${MLFLOW_PORT}/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── LocalAI (OpenAI-compatible model server) ─────────────────────────────
  localai:
    image: localai/localai:${LOCALAI_IMAGE_TAG:-latest-cpu}
    container_name: localai
    restart: unless-stopped
    environment:
      LOCALAI_API_KEY: ${LOCALAI_API_KEY}
      LOCALAI_THREADS: ${LOCALAI_THREADS:-4}
      LOCALAI_CONTEXT_SIZE: ${LOCALAI_CONTEXT_SIZE:-2048}
      # Idle watchdog — auto-unload models after timeout
      LOCALAI_WATCHDOG_IDLE: "true"
      LOCALAI_WATCHDOG_IDLE_TIMEOUT: ${LOCALAI_WATCHDOG_IDLE_TIMEOUT:-15m}
      LOCALAI_WATCHDOG_BUSY: "true"
      LOCALAI_WATCHDOG_BUSY_TIMEOUT: ${LOCALAI_WATCHDOG_BUSY_TIMEOUT:-5m}
      # Memory safety — only one model loaded at a time (LRU eviction)
      LOCALAI_MAX_ACTIVE_BACKENDS: ${LOCALAI_MAX_ACTIVE_BACKENDS:-1}
      LOCALAI_CORS: "true"
    volumes:
      - ./volumes/localai/models:/build/models
    ports:
      - "${LOCALHOST_LOCALAI_PORT:-8080}:8080"
    networks:
      - mlflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 60s
    # ── NVIDIA GPU support (uncomment to enable) ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Open WebUI (Chat interface) ────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      localai:
        condition: service_healthy
    environment:
      # Connect to LocalAI as an OpenAI-compatible backend
      OPENAI_API_BASE_URL: "http://localai:8080/v1"
      OPENAI_API_KEY: ${LOCALAI_API_KEY}
      # Also connect to host Ollama (both backends available in the UI)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      # Auth & security
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}
      WEBUI_AUTH: "True"
      # Auto-create admin account on first launch (no manual signup needed)
      WEBUI_ADMIN_EMAIL: ${OPENWEBUI_ADMIN_EMAIL:-admin@local.dev}
      WEBUI_ADMIN_PASSWORD: ${OPENWEBUI_ADMIN_PASSWORD:-change-me}
      WEBUI_ADMIN_NAME: ${OPENWEBUI_ADMIN_NAME:-Admin}
      ENABLE_INITIAL_ADMIN_SIGNUP: "False"
      # Allow users to generate API keys
      ENABLE_API_KEYS: "True"
      USER_PERMISSIONS_FEATURES_API_KEYS: "True"
      # Offline mode — no HuggingFace downloads or version checks
      OFFLINE_MODE: "true"
    volumes:
      - ./volumes/open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${LOCALHOST_OPENWEBUI_PORT:-3000}:8080"
    networks:
      - mlflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  mlflow-network:
    name: mlflow-network
