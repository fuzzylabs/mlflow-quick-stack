# ============================================================================
# MLflow Auth Configuration
# ============================================================================
# WARNING: This file contains default credentials. Change these before any
# real use and keep them in sync with .env:
#   - database_uri  →  must match POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
#   - admin_password  →  must match MLFLOW_AUTH_ADMIN_PASSWORD (≥ 13 chars)
# ============================================================================

[mlflow]
default_permission = READ
database_uri = postgresql://mlflow:mlflow-s3cr3t!@postgres:5432/mlflow
admin_username = admin
admin_password = admin-s3cr3t!
authorization_function = mlflow.server.auth:authenticate_request_basic_auth
grant_default_workspace_access = false
